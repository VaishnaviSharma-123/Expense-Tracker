<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(100%, 420px);
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    .heading {
      margin: 0 0 20px;
      font-size: 1.5rem;
      text-align: center;
    }

    .field {
      display: grid;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccd0d5;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #4caf50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
    }

    #add-button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    #add-button:hover {
      background: #43a047;
      transform: translateY(-1px);
    }

    .list-title {
      margin: 24px 0 12px;
      font-size: 1.05rem;
    }

    #list {
      display: grid;
      gap: 12px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #1a1a2e;
      color: white;
    }

    .item span {
      flex: 1;
      word-break: break-word;
    }

    .delete-button {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      background: #e53935;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .delete-button:hover {
      background: #d32f2f;
    }

    .empty-state {
      color: #666;
      text-align: center;
      padding: 18px 0;
    }
  </style>
</head>
<body>
  <section class="container">
    <h1 class="heading">Expense Tracker</h1>
    <div class="field">
      <input id="title" type="text" placeholder="Enter title" />
      <input id="amount" type="number" placeholder="Enter amount" />
      <button id="add-button" type="button">Add</button>
    </div>
    <h2 class="list-title">All Expenses</h2>
    <div id="list">
      <div class="empty-state">Loading expenses…</div>
    </div>
  </section>

  <script>
    const apiBase = 'http://localhost:3000/api/expenses';

    async function addExpense() {
      const titleInput = document.getElementById('title');
      const amountInput = document.getElementById('amount');
      const title = titleInput.value.trim();
      const amount = amountInput.value.trim();

      if (!title || !amount) {
        alert('Please enter both title and amount');
        return;
      }

      await fetch(apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, amount: Number(amount) })
      });

      titleInput.value = '';
      amountInput.value = '';
      await loadExpenses();
    }

    async function loadExpenses() {
      const listDiv = document.getElementById('list');
      const response = await fetch(apiBase);
      const data = await response.json();

      listDiv.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        listDiv.innerHTML = '<div class="empty-state">No expenses found.</div>';
        return;
      }

      listDiv.innerHTML = data
        .map(
          item => `
            <div class="item">
              <span>${item.title} - ₹${item.amount}</span>
              <button class="delete-button" onclick="deleteExpense('${item._id}')">Delete</button>
            </div>
          `
        )
        .join('');
    }

    async function deleteExpense(id) {
      await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
      await loadExpenses();
    }

    document.getElementById('add-button').addEventListener('click', addExpense);
    loadExpenses();
  </script>
</body>
</html>
